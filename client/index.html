<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>Dyneros Ltd — Enterprise Blockchain Infrastructure Platform</title>
    <meta name="description" content="Dyneros provides managed private blockchain infrastructure for enterprises. High-throughput, EVM-compatible, fixed-cost. Build on Dyneros Chain." />
    <meta name="keywords" content="enterprise blockchain, private blockchain, blockchain infrastructure, EVM, smart contracts, Dyneros Chain, permissioned blockchain" />
    <meta name="author" content="Dyneros Ltd" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dyneros.io/" />
    <meta property="og:title" content="Dyneros Ltd — Enterprise Blockchain Infrastructure" />
    <meta property="og:description" content="Managed private blockchain infrastructure for enterprises. 1,200+ TPS, immediate finality, EVM-compatible, fixed-cost pricing." />
    <meta property="og:site_name" content="Dyneros Ltd" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dyneros Ltd — Enterprise Blockchain Infrastructure" />
    <meta name="twitter:description" content="Managed private blockchain infrastructure for enterprises. 1,200+ TPS, immediate finality, EVM-compatible." />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Dyneros Ltd",
      "url": "https://dyneros.io",
      "description": "Managed private blockchain infrastructure platform for enterprise organisations.",
      "foundingDate": "2024",
      "industry": "Blockchain Technology",
      "serviceType": "Enterprise Blockchain Infrastructure",
      "offers": {
        "@type": "Offer",
        "name": "Dyneros Chain",
        "description": "Private permissioned blockchain with 1,200+ TPS, EVM compatibility, and fixed-cost pricing."
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Dyneros Ltd",
      "url": "https://dyneros.io"
    }
    </script>

    <!-- Font preconnects for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
