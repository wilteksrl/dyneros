<!doctype html>
<html lang="it">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>Dyneros Ltd — Piattaforma di Infrastruttura Blockchain Enterprise</title>
    <meta name="description" content="Dyneros fornisce infrastruttura blockchain privata gestita per le imprese. Alta capacità, compatibile EVM, costi fissi. Costruisci su Dyneros Chain." />
    <meta name="keywords" content="blockchain enterprise, blockchain privata, infrastruttura blockchain, EVM, smart contract, Dyneros Chain, blockchain permissionata" />
    <meta name="author" content="Dyneros Ltd" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Italian" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dyneros.com/" />
    <meta property="og:title" content="Dyneros Ltd — Infrastruttura Blockchain Enterprise" />
    <meta property="og:description" content="Infrastruttura blockchain privata gestita per le imprese. 1.200+ TPS, finalità immediata, compatibile EVM, prezzi fissi." />
    <meta property="og:site_name" content="Dyneros Ltd" />
    <meta property="og:locale" content="it_IT" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dyneros Ltd — Infrastruttura Blockchain Enterprise" />
    <meta name="twitter:description" content="Infrastruttura blockchain privata gestita per le imprese. 1.200+ TPS, finalità immediata, compatibile EVM." />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Dyneros Ltd",
      "url": "https://dyneros.com",
      "description": "Piattaforma di infrastruttura blockchain privata gestita per organizzazioni enterprise.",
      "foundingDate": "2024",
      "industry": "Tecnologia Blockchain",
      "serviceType": "Infrastruttura Blockchain Enterprise",
      "offers": {
        "@type": "Offer",
        "name": "Dyneros Chain",
        "description": "Blockchain privata permissionata con 1.200+ TPS, compatibilità EVM e prezzi fissi."
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Dyneros Ltd",
      "url": "https://dyneros.com"
    }
    </script>

    <!-- Font preconnects for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
